<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadə JS Animasiyaları - İmtahan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h1>JavaScript Animasiya Nümunələri</h1>
        <p class="description">İmtahan üçün hazırlanmış sadə animasiya nümunələri. Hər düymə qutu üzərində fərqli bir JS animasiyası işə salır.</p>

        <!-- Düymələr paneli -->
        <div class="button-group">
            <button onclick="animateMove()">1. Hərəkət Animasiyası</button>
            <button onclick="animateScale()">2. Böyümə Animasiyası</button>
            <button onclick="animateRotate()">3. Fırlanma Animasiyası</button>
            <button onclick="animateFade()">4. Şəffaflıq Animasiyası</button>
            <button onclick="animateColor()">5. Rəng Animasiyası</button>
        </div>

        <!-- Animasiya ediləcək qutu -->
        <div class="box-container">
            <div id="animBox" class="test-box">QUTU</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
