<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rəng Animasiyası</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #06060c;
            --text-primary: #f1f3f9;
            --text-secondary: #949aab;
            --accent-color: #f9d423;
            --glass-bg: rgba(13, 14, 27, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-glow: rgba(249, 212, 35, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #mathCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }

        /* UI Overlays */
        .ui-overlay {
            position: absolute;
            z-index: 10;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
        }

        .glass-panel {
            pointer-events: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-panel:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), 0 0 15px var(--glass-glow);
        }

        header.glass-panel {
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 14px 24px;
        }

        .logo-icon {
            font-size: 28px;
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-color);
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Controls Panel */
        .controls-panel {
            position: absolute;
            right: 24px;
            top: 24px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .controls-panel h2 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 8px;
        }

        .info-text {
            font-size: 11px;
            line-height: 1.5;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.15);
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid var(--accent-color);
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        .val-display {
            font-family: monospace;
            color: var(--accent-color);
            font-weight: 600;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            box-shadow: 0 0 8px var(--accent-color);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.25);
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
            display: inline-block;
            margin-top: 10px;
            text-align: center;
        }

        .back-btn:hover {
            background: var(--accent-color);
            color: var(--bg-base);
            box-shadow: 0 0 10px var(--accent-color);
        }

        footer.glass-panel {
            align-self: flex-start;
            padding: 8px 16px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .ui-overlay {
                display: flex;
                flex-direction: column;
                overflow-y: auto;
                pointer-events: auto;
                gap: 15px;
            }
            .controls-panel {
                position: static;
                width: 100%;
            }
            header.glass-panel {
                width: 100%;
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="mathCanvas"></canvas>

    <div class="ui-overlay">
        <!-- Header -->
        <header class="glass-panel">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span class="logo-icon">🌈</span>
                <div>
                    <h1>Rəng Animasiyası</h1>
                    <p class="subtitle">Smooth Gradient Morphing</p>
                </div>
            </div>
        </header>

        <!-- Controls -->
        <aside class="glass-panel controls-panel">
            <h2>Parametrlər</h2>
            <div class="info-text">
                Ekranı əhatə edən gradient fon rənglərinin zamanla axıcı və rəvan şəkildə HSL spektrində dəyişməsi.
            </div>

            <div class="slider-group">
                <div class="slider-header">
                    <span>Keçid Sürəti</span>
                    <span class="val-display" id="val-speed">0.5</span>
                </div>
                <input type="range" id="param-speed" min="0.1" max="2.0" step="0.1" value="0.5">
            </div>

            <a href="index.html" class="back-btn">← Portala Qayıt</a>
        </aside>

        <!-- Footer Help -->
        <footer class="glass-panel">
            <span>💡 Rəng tonlarının yavaş-yavaş bir-birinə qarışaraq necə dəyişdiyini izləyin.</span>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('mathCanvas');
        const ctx = canvas.getContext('2d');

        const state = {
            width: window.innerWidth,
            height: window.innerHeight,
            hue: 0
        };

        function getSliderVal(id) {
            return parseFloat(document.getElementById(id).value);
        }

        function setupSlider(sliderId, displayId) {
            const slider = document.getElementById(sliderId);
            const display = document.getElementById(displayId);
            slider.addEventListener('input', () => {
                display.textContent = slider.value;
            });
        }

        setupSlider('param-speed', 'val-speed');

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            state.width = window.innerWidth;
            state.height = window.innerHeight;
            canvas.width = state.width * dpr;
            canvas.height = state.height * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            const speed = getSliderVal('param-speed');
            state.hue = (state.hue + speed) % 360;

            // Draw morphing diagonal linear gradient
            const grad = ctx.createLinearGradient(0, 0, state.width, state.height);
            
            const color1 = `hsl(${state.hue}, 80%, 15%)`;
            const color2 = `hsl(${(state.hue + 90) % 360}, 80%, 15%)`;
            const color3 = `hsl(${(state.hue + 180) % 360}, 80%, 10%)`;

            grad.addColorStop(0, color1);
            grad.addColorStop(0.5, color2);
            grad.addColorStop(1, color3);

            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, state.width, state.height);

            // Draw a floating glowing orb in the center
            const cx = state.width / 2;
            const cy = state.height / 2;
            const size = Math.min(state.width, state.height) * 0.25;

            const orbGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, size);
            orbGrad.addColorStop(0, `hsla(${(state.hue + 45) % 360}, 100%, 70%, 0.3)`);
            orbGrad.addColorStop(1, 'transparent');

            ctx.beginPath();
            ctx.arc(cx, cy, size, 0, Math.PI * 2);
            ctx.fillStyle = orbGrad;
            ctx.fill();

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
